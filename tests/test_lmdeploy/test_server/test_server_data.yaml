# 一些通用的配置
common_settings:
  # model默认缓存位置
  model_dir: "/workspace/mnt/"

test_models:
  # 下边是测试模型的列表
  ##################################
  llama-3.1-8B-instruct:
    model_info:
      # 默认会去model_dir里找对应模型，除非另定义了path
      # model_dir: "/workspace/mnt/"
      # 如果在model_dir里没找到，就去model_repo下载
      model_repo:
        model_id: 35801
        version_id: 40866
        project_id: 0  # 默认是0，从official仓库下载
    service_info:
      common:
        # 放一些通用的service参数和测试case
        service_args:
          common: "--enable-prefix-caching"
          a100: "--cache-max-entry-count 0.4"  # 每种GPU特殊的参数
        test_data:
          - prompt: "The following are questions with answers.\n\nQ: What is the capital of Germany?\nA: Berlin\nQ: What is the capital of Italy?\nA: Rome\nQ:What is the capital of France?\nA:"
            ground_truth:
              a100: "Paris"
              h100: "Paris"
              t4: "Paris"
              v100: "Paris"
            verification: in
      fp16:
        target_gpus: ["a100", "h100", "t4", "v100"]  # 必须参数，设置可以在哪些GPU上跑，否则略过这个test case
        service_args:
          t4: "--tp 2"
        test_data:
          - prompt: "Please describe Shopee in short."
            ground_truth:
              a100: "Shopee is a leading e-commerce platform in Southeast Asia and Taiwan. It is a platform tailored for the region, providing customers with an easy, secure and fast online shopping experience through strong payment and logistical support.\n\nShopee aims to continually enhance its platform and become the region’s e-commerce destination of choice. Shope"
              h100: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion, beauty, and home goods. It was founded in 2015 and is owned by Sea Group, a Singapore-based technology company. Shopee is known for its user-friendly interface, fast"
              t4: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion, beauty, and home goods. It was founded in 2015 and is owned by Sea Group, a Singapore-based technology company. Shopee is known for its user-friendly interface, fast"
              v100: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion, beauty, and home goods. It was founded in 2015 and is owned by Sea Group, a Singapore-based technology company. Shopee is known for its user-friendly interface, fast"
            verification: ==
      fp16-kvint8:
        target_gpus: ["a100", "h100", "t4", "v100"]
        service_args:
          common: "--quant-policy 8"
          t4: "--tp 2 --cache-max-entry-count 0.7"
        test_data:
          - prompt: "Please describe Shopee in short."
            ground_truth:
              a100: "Shopee is a leading e-commerce platform in Southeast Asia and Taiwan. It is a platform tailored for the region, "
              h100: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion"
              t4: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion"
              v100: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion"
            verification: startswith
      awq-w4a16-kvfp16:
        target_gpus: ["a100", "h100", "t4", "v100"]
        # 先在model_dir里找，如果找不到就执行量化脚本
        quantization: "awq-w4a16"
        test_data:
          - prompt: "Please describe Shopee in short."
            ground_truth:
              a100: "Shopee is a great company"
              h100: "Shopee is a popular e-commerce platform in Southeast Asia, founded in Singapore in 2015. It allows users to buy and sell a wide range of products, from electronics and fashion items to home goods and groceries."
              t4: "Shopee is a popular e-commerce platform in Southeast Asia, founded in Singapore in 2015. It allows users to buy and sell a wide range of products, from electronics and fashion items to home goods and groceries."
              v100: "Shopee is a popular e-commerce platform in Southeast Asia, founded in Singapore in 2015. It allows users to buy and sell a wide range of products, from electronics and fashion items to home goods and groceries."
            verification: startswith
      fp8-kvfp8:
        target_gpus: ["h100"]
        # 先在model_dir里找，如果找不到就执行量化脚本
        quantization: "fp8"
        service_args:
          common: "--quant-policy 16"
        test_data:
          - prompt: "Please describe Shopee in short."
            ground_truth:
              h100: "Shopee is a popular e-commerce platform that allows users to buy and sell a wide range of products, including electronics, fashion"
            verification: startswith
